<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#f8b8b8" />
  <title>The Sweets Stopwatch Promo</title>
  <style>
    :root {
      --artifact-background: var(--theme-background, #fff8f9);
      --artifact-background-light: var(--theme-background-light, #fff2f3);
      --artifact-background-mid: var(--theme-background-mid, #f9d7dc);
      --artifact-border-light: var(--theme-border-light, #f3c8d0);
      --artifact-border-dark: var(--theme-border-dark, #d998a6);
      --artifact-text-primary: var(--theme-text-primary, #592d37);
      --artifact-text-secondary: var(--theme-text-secondary, #8c6470);
      --artifact-selected: var(--theme-selected, #ffe8ec);
      --artifact-accent-pink: #f8b8b8;
      --artifact-accent-pink-strong: #ee8fa5;
      --artifact-accent-pink-soft: #fde6ea;
      --artifact-accent-rose: #f7c3cd;
      --artifact-accent-white: #fffdfd;
      --artifact-accent-brown: #6f3141;
      --artifact-panel-dark: #5a2332;
      --artifact-panel-darker: #421622;
      --artifact-glow: rgba(248, 184, 184, 0.72);
      --artifact-glow-soft: rgba(248, 184, 184, 0.38);
      --artifact-confetti-1: #ee8fa5;
      --artifact-confetti-2: #ffd9df;
      --artifact-confetti-3: #ffe58c;
      --artifact-confetti-4: #ffffff;
    }

    html[data-theme='dark'] {
      --artifact-background: #24171d;
      --artifact-background-light: #2f1f26;
      --artifact-background-mid: #452734;
      --artifact-border-light: #6d4454;
      --artifact-border-dark: #8f6070;
      --artifact-text-primary: #fff3f7;
      --artifact-text-secondary: #efcad5;
      --artifact-selected: #4b2f39;
      --artifact-accent-white: #fff7fa;
      --artifact-accent-brown: #fff3f7;
      --artifact-panel-dark: #4d1b25;
      --artifact-panel-darker: #381118;
      --artifact-glow-soft: rgba(255, 185, 210, 0.22);
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { height: 100%; }
    body {
      margin: 0;
      min-height: 100svh;
      overflow: hidden;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at 20% 12%, var(--artifact-accent-pink-soft), transparent 22%),
        radial-gradient(circle at 86% 12%, var(--artifact-background-mid), transparent 24%),
        linear-gradient(180deg, var(--artifact-background), var(--artifact-background-light));
      color: var(--artifact-text-primary);
    }

    .app {
      min-height: 100svh;
      padding: max(10px, env(safe-area-inset-top)) max(12px, env(safe-area-inset-right)) max(10px, env(safe-area-inset-bottom)) max(12px, env(safe-area-inset-left));
      display: flex;
      align-items: stretch;
      justify-content: center;
    }

    .stage {
      position: relative;
      width: min(100%, 1366px);
      min-height: calc(100svh - 20px);
      border-radius: 30px;
      overflow: hidden;
      background:
        radial-gradient(circle at 50% 80%, rgba(255,255,255,0.55), transparent 24%),
        linear-gradient(180deg, rgba(255,255,255,0.34), rgba(255,255,255,0.08));
      border: 1px solid var(--artifact-border-light);
      box-shadow: 0 24px 80px rgba(245, 122, 157, 0.18);
      isolation: isolate;
    }

    .bg-lines,
    .bg-hearts,
    .fx-confetti,
    .fx-fail,
    .fx-win {
      position: absolute;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
    }

    .bg-lines::before,
    .bg-lines::after {
      content: "";
      position: absolute;
      top: -8%;
      width: 44%;
      height: 118%;
      border-radius: 50%;
      border: 3px solid rgba(255,255,255,0.72);
      filter: drop-shadow(0 0 12px rgba(255,255,255,0.5));
      opacity: 0.8;
    }

    .bg-lines::before { left: -28%; }
    .bg-lines::after { right: -28%; }

    .heart-bg {
      position: absolute;
      color: rgba(255,255,255,0.52);
      text-shadow: 0 0 14px rgba(255,255,255,0.4);
      font-size: clamp(22px, 2.2vw, 34px);
    }

    .sparkle {
      position: absolute;
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: rgba(255,255,255,0.95);
      box-shadow: 0 0 14px rgba(255,255,255,0.9);
      opacity: 0.72;
    }

    .content {
      position: relative;
      z-index: 2;
      min-height: calc(100svh - 20px);
      display: grid;
      grid-template-rows: auto auto 1fr auto auto;
      justify-items: center;
      gap: clamp(14px, 1.8vh, 24px);
      padding: clamp(26px, 3vh, 38px) clamp(30px, 3.4vw, 46px) clamp(28px, 3vh, 40px);
      text-align: center;
    }

    .logo {
      margin: 0;
      font-family: "Brush Script MT", "Segoe Script", cursive;
      font-size: clamp(88px, 9vw, 154px);
      line-height: 0.9;
      color: #c85f79;
      -webkit-text-stroke: 0.4px rgba(255, 236, 241, 0.34);
      text-shadow:
        0 0 6px rgba(200,95,121,0.22),
        0 0 16px rgba(200,95,121,0.18),
        0 0 28px rgba(248,184,184,0.18);
      letter-spacing: 0.012em;
      user-select: none;
      animation: neonPulse 2.6s ease-in-out infinite;
      filter: saturate(1.02) brightness(1.02);
    }

    .headline {
      margin: 0;
      font-weight: 900;
      font-size: clamp(28px, 2.8vw, 50px);
      line-height: 1.08;
      color: var(--artifact-accent-brown);
      text-shadow: 0 2px 0 rgba(255,255,255,0.6);
      letter-spacing: -0.02em;
      text-wrap: balance;
    }

    .timer-wrap {
      position: relative;
      width: min(100%, 1190px);
      align-self: center;
      padding-top: clamp(14px, 1.8vh, 22px);
      padding-bottom: clamp(188px, 23vh, 240px);
    }

    .timer-panel {
      position: relative;
      width: 100%;
      border-radius: clamp(28px, 3vw, 42px);
      padding: clamp(34px, 3vw, 42px) clamp(28px, 2.8vw, 38px) clamp(110px, 9vw, 132px);
      background: linear-gradient(180deg, var(--artifact-panel-dark), var(--artifact-panel-darker));
      border: 6px solid rgba(255, 242, 245, 0.96);
      box-shadow:
        0 0 0 4px rgba(248, 184, 184, 0.62),
        0 0 40px rgba(248, 184, 184, 0.34),
        0 28px 60px rgba(120, 30, 55, 0.28),
        inset 0 0 26px rgba(255, 183, 196, 0.08);
    }

    .timer-panel::before {
      content: "";
      position: absolute;
      inset: 10px;
      border-radius: calc(clamp(28px, 3vw, 42px) - 8px);
      border: 2px solid rgba(255, 188, 209, 0.16);
      pointer-events: none;
    }

    .display {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      min-height: clamp(216px, 25vw, 330px);
      padding: clamp(18px, 2vh, 24px) 0 clamp(18px, 2vh, 24px);
      user-select: none;
      font-family: "Aptos", "Segoe UI", Arial, Helvetica, sans-serif;
      font-weight: 800;
      font-variant-numeric: tabular-nums lining-nums;
      font-size: clamp(154.1px, 20.47vw, 294.4px);
      line-height: 0.92;
      letter-spacing: 0.02em;
      color: #fff8fa;
      text-shadow:
        0 0 10px rgba(255,255,255,0.09),
        0 0 20px rgba(248,184,184,0.16);
    }

    .digit,
    .seg,
    .colon,
    .colon::before,
    .colon::after {
      display: none;
    }

    .button-row {
      position: absolute;
      left: 50%;
      bottom: 18px;
      transform: translateX(-50%);
      width: 100%;
      display: flex;
      justify-content: center;
      pointer-events: none;
    }

    .action-btn {
      pointer-events: auto;
      position: relative;
      width: clamp(148px, 13vw, 188px);
      aspect-ratio: 1 / 1;
      border-radius: 50%;
      border: 0;
      cursor: pointer;
      touch-action: manipulation;
      color: var(--artifact-accent-white);
      font-size: clamp(26px, 2.4vw, 36px);
      font-weight: 900;
      letter-spacing: 0.03em;
      text-transform: uppercase;
      background:
        radial-gradient(circle at 30% 26%, rgba(255,255,255,0.26), transparent 28%),
        linear-gradient(180deg, #d97892, #c85f79 55%, #b44a66);
      box-shadow:
        0 0 0 6px rgba(255, 245, 247, 0.92),
        0 0 0 10px rgba(200, 95, 121, 0.28),
        0 18px 40px rgba(180, 74, 102, 0.28),
        inset 0 2px 0 rgba(255,255,255,0.24),
        inset 0 -14px 26px rgba(106, 28, 47, 0.18);
      text-shadow: 0 2px 10px rgba(255,255,255,0.16);
      transition: transform 0.12s ease, box-shadow 0.12s ease, filter 0.12s ease;
      will-change: transform;
    }

    .action-btn::after {
      content: "";
      position: absolute;
      inset: 10px;
      border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.32);
      pointer-events: none;
    }

    .action-btn:hover {
      transform: translateY(-2px) scale(1.012);
      filter: saturate(1.05);
    }

    .action-btn:active,
    .action-btn.pressed {
      transform: translateY(4px) scale(0.972);
      box-shadow:
        0 0 0 6px rgba(255, 242, 247, 0.9),
        0 0 0 10px rgba(200, 95, 121, 0.26),
        0 10px 22px rgba(180, 74, 102, 0.22),
        inset 0 12px 18px rgba(106, 28, 47, 0.14);
    }

    .action-btn:focus-visible {
      outline: 4px solid var(--artifact-accent-pink-soft);
      outline-offset: 6px;
    }

    .result {
      min-height: 70px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 0 20px;
    }

    .result-card {
      display: none;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 14px 22px;
      border-radius: 999px;
      background: rgba(255,255,255,0.3);
      border: 1px solid rgba(255,255,255,0.45);
      backdrop-filter: blur(8px);
      font-size: clamp(18px, 1.9vw, 28px);
      font-weight: 900;
      letter-spacing: -0.02em;
      box-shadow: 0 14px 30px rgba(245, 122, 157, 0.1);
    }

    .result-card.show { display: inline-flex; animation: riseIn 0.28s ease; }
    .result-card.success { color: var(--artifact-accent-pink-strong); }
    .result-card.fail { color: #a25b72; }

    .confetti-piece {
      position: absolute;
      top: -10%;
      width: 12px;
      height: 28px;
      border-radius: 999px;
      opacity: 0;
      animation: confettiFall 2.25s linear forwards;
    }

    .float-heart,
    .float-fail {
      position: absolute;
      bottom: 12%;
      opacity: 0;
      filter: drop-shadow(0 8px 12px rgba(0,0,0,0.08));
      animation: floatUp 1.8s ease-out forwards;
    }
    .float-fail { animation-name: failBurst; }

    .footer-note {
      font-size: 14px;
      font-weight: 700;
      color: var(--artifact-text-secondary);
      letter-spacing: 0.02em;
      text-align: center;
      padding-bottom: 8px;
    }

    .footer-note strong { color: var(--artifact-accent-pink-strong); }

    @keyframes neonPulse {
      0%, 100% {
        text-shadow:
          0 0 3px rgba(255,255,255,0.96),
          0 0 10px rgba(255,255,255,0.92),
          0 0 22px rgba(248,184,192,0.96),
          0 0 40px rgba(239,143,166,0.82),
          0 0 68px rgba(239,143,166,0.58);
      }
      50% {
        text-shadow:
          0 0 4px rgba(255,255,255,1),
          0 0 12px rgba(255,255,255,0.98),
          0 0 28px rgba(248,184,192,1),
          0 0 46px rgba(239,143,166,0.9),
          0 0 80px rgba(239,143,166,0.62);
      }
    }

    @keyframes riseIn {
      from { opacity: 0; transform: translateY(10px) scale(0.97); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    @keyframes confettiFall {
      0% { transform: translate3d(0, -20px, 0) rotate(0deg); opacity: 0; }
      8% { opacity: 1; }
      100% { transform: translate3d(var(--drift), 112vh, 0) rotate(var(--spin)); opacity: 0; }
    }

    @keyframes floatUp {
      0% { transform: translateY(0) scale(0.7); opacity: 0; }
      12% { opacity: 1; }
      100% { transform: translateY(-180px) scale(1.15); opacity: 0; }
    }

    @keyframes failBurst {
      0% { transform: translateY(0) rotate(0deg) scale(0.72); opacity: 0; }
      12% { opacity: 1; }
      36% { transform: translateY(-38px) rotate(-10deg) scale(1); }
      58% { transform: translateY(-86px) rotate(10deg); }
      100% { transform: translateY(-166px) rotate(-14deg) scale(1.12); opacity: 0; }
    }

    @media screen and (max-width: 1024px) and (orientation: portrait) {
      body { overflow: auto; }
      .stage, .content { min-height: auto; }
      .content { padding: 18px 18px 16px; }
      .logo { font-size: clamp(54px, 12vw, 96px); }
      .headline { font-size: clamp(24px, 6vw, 38px); }
      .digit { width: min(18vw, 128px); }
      .colon { width: min(5vw, 34px); height: min(18vw, 170px); }
      .timer-wrap { padding-bottom: 84px; }
      .action-btn { width: min(38vw, 190px); }
    }

    @media screen and (max-width: 900px) {
      .app { padding: 8px; }
      .stage { min-height: calc(100svh - 16px); border-radius: 22px; }
      .content { min-height: calc(100svh - 16px); gap: 10px; padding: 16px 14px 14px; }
      .logo { font-size: clamp(50px, 11vw, 84px); }
      .headline { font-size: clamp(22px, 5.2vw, 30px); }
      .digit { width: min(17vw, 112px); }
      .colon { width: min(4vw, 28px); height: min(16vw, 140px); }
      .action-btn { width: min(34vw, 164px); font-size: clamp(24px, 4.8vw, 34px); }
      .result-card { font-size: clamp(16px, 4vw, 22px); }
      .footer-note { font-size: 12px; }
    }

    @media screen and (max-height: 900px) and (orientation: landscape) {
      .app { padding: 8px 10px; }
      .stage { min-height: calc(100svh - 16px); }
      .content {
        min-height: calc(100svh - 16px);
        gap: clamp(8px, 1vh, 14px);
        padding: clamp(18px, 2vh, 22px) clamp(22px, 2.6vw, 32px) clamp(14px, 1.8vh, 20px);
      }
      .logo { font-size: clamp(66px, 6.8vw, 110px); }
      .headline {
        font-size: clamp(24px, 2.3vw, 38px);
        line-height: 1.02;
      }
      .timer-wrap {
        width: min(100%, 1120px);
        padding-top: clamp(8px, 1vh, 12px);
        padding-bottom: clamp(132px, 16vh, 156px);
      }
      .timer-panel {
        border-radius: clamp(24px, 2.5vw, 34px);
        padding: clamp(22px, 2.2vw, 30px) clamp(24px, 2.4vw, 30px) clamp(76px, 7vh, 94px);
      }
      .display {
        min-height: clamp(168px, 19vw, 220px);
        padding: clamp(14px, 1.4vh, 18px) 0;
        font-size: clamp(167.9px, 18.63vw, 246.1px);
        line-height: 0.88;
      }
      .button-row { bottom: 10px; }
      .action-btn {
        width: clamp(132px, 11.2vw, 162px);
        font-size: clamp(24px, 2.1vw, 32px);
      }
      .result { min-height: 54px; }
      .result-card {
        padding: 12px 18px;
        font-size: clamp(16px, 1.7vw, 24px);
      }
      .footer-note {
        font-size: 12px;
        padding-bottom: 2px;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation: none !important; transition: none !important; }
    }

    @media print {
      body {
        margin: 0;
        padding: 0.4in 0.6in;
        background: #fff;
        print-color-adjust: exact;
        -webkit-print-color-adjust: exact;
      }
      .container, .dashboard, .stage, main { max-width: 100% !important; width: 100% !important; }
      section, [class*="section"], .header { break-inside: avoid; margin-bottom: 20px !important; }
      [class*="card"], [class*="Card"] { break-inside: avoid; padding: 18px !important; box-shadow: none !important; border: 1px solid rgba(0,0,0,0.08); }
      [class*="grid"], [class*="row"] { gap: 10px !important; margin-bottom: 20px !important; }
      [class*="chart"], [class*="Chart"] { break-inside: avoid; height: 240px !important; }
      [class*="chart"][class*="tall"], [class*="Chart"][class*="tall"], [class*="chart"][class*="full"], [class*="Chart"][class*="full"] { height: 280px !important; }
      table, thead, .funnel, .heatmap, .list, .goals { break-inside: avoid; }
      [class*="quote-list"], [class*="scroll"], [style*="max-height"], [style*="overflow"] { max-height: none !important; overflow: visible !important; }
      [class*="tab-panel"], [class*="tabpanel"] { display: block !important; }
      [class*="tab-bar"], [class*="tabs"]:not([class*="panel"]) { display: none !important; }
      [class*="fade"], [class*="animate"], [class*="slide"] { opacity: 1 !important; transform: none !important; }
      *, *::before, *::after { animation: none !important; transition: none !important; }
      button, [role="button"], .interactive-only { display: none !important; }
    }
  </style>
</head>
<body>
  <div class="app">
    <main class="stage">
      <div class="bg-lines"></div>
      <div class="bg-hearts" aria-hidden="true">
        <span class="heart-bg" style="left: 7%; bottom: 12%;">♡</span>
        <span class="heart-bg" style="right: 7%; bottom: 16%;">♡</span>
        <span class="heart-bg" style="right: 15%; bottom: 8%; opacity: 0.45; font-size: clamp(18px, 1.8vw, 26px);">♡</span>
        <span class="sparkle" style="left: 5%; top: 40%;"></span>
        <span class="sparkle" style="left: 10%; bottom: 18%;"></span>
        <span class="sparkle" style="right: 6%; top: 58%;"></span>
        <span class="sparkle" style="right: 10%; bottom: 28%;"></span>
      </div>
      <div class="fx-confetti" id="confetti"></div>
      <div class="fx-win" id="winFx"></div>
      <div class="fx-fail" id="failFx"></div>

      <div class="content">
        <h1 class="logo">The Sweets♡</h1>
        <h2 class="headline"></h2>
        <h2 class="headline">Time Challenge</h2>

        <section class="timer-wrap" aria-label="Stopwatch challenge">
          <div class="timer-panel">
            <div class="display" id="display" aria-live="polite" aria-label="00:00">00:00</div>
          </div>
          <div class="button-row">
            <button class="action-btn" id="actionBtn" type="button">Start</button>
          </div>
        </section>

        <div class="result" aria-live="polite">
          <div class="result-card success" id="successCard"><span>💖</span><span>So sweet, kamu berhasil!</span></div>
          <div class="result-card fail" id="failCard"><span>💔</span><span>Yaah,lain kali pasti berhasil!</span></div>
        </div>

        <div class="footer-note">Berhenti di <strong>10:00</strong> untuk gratis pembayaran</div>
      </div>
    </main>
  </div>

  <script>
    const TARGET_CS = 1000;
    const MAX_CS = 1200;
    const display = document.getElementById('display');
    const actionBtn = document.getElementById('actionBtn');
    const successCard = document.getElementById('successCard');
    const failCard = document.getElementById('failCard');
    const confetti = document.getElementById('confetti');
    const winFx = document.getElementById('winFx');
    const failFx = document.getElementById('failFx');

    let isRunning = false;
    let startTs = 0;
    let elapsedMs = 0;
    let rafId = null;

    function toCentiseconds(ms) {
      return Math.floor(ms / 10);
    }

    function formatTime(ms) {
      const cs = toCentiseconds(ms);
      const seconds = Math.floor(cs / 100);
      const hundredths = cs % 100;
      return `${String(seconds).padStart(2, '0')}:${String(hundredths).padStart(2, '0')}`;
    }

    function setButtonLabel() {
      const cs = toCentiseconds(elapsedMs);
      if (isRunning) actionBtn.textContent = 'Stop';
      else if (cs === 0) actionBtn.textContent = 'Start';
      else actionBtn.textContent = 'Reset';
    }

    function clearFx() {
      successCard.classList.remove('show');
      failCard.classList.remove('show');
      confetti.innerHTML = '';
      winFx.innerHTML = '';
      failFx.innerHTML = '';
    }

    function render(ms) {
      const formatted = formatTime(ms);
      display.setAttribute('aria-label', formatted);
      display.textContent = formatted;
    }

    function spawnConfetti() {
      const colors = ['var(--artifact-confetti-1)','var(--artifact-confetti-2)','var(--artifact-confetti-3)','var(--artifact-confetti-4)'];
      for (let i = 0; i < 42; i++) {
        const piece = document.createElement('span');
        piece.className = 'confetti-piece';
        piece.style.left = `${Math.random() * 100}%`;
        piece.style.background = colors[i % colors.length];
        piece.style.setProperty('--drift', `${(Math.random() - 0.5) * 220}px`);
        piece.style.setProperty('--spin', `${(Math.random() - 0.5) * 980}deg`);
        piece.style.animationDelay = `${Math.random() * 0.24}s`;
        piece.style.width = `${8 + Math.random() * 8}px`;
        piece.style.height = `${18 + Math.random() * 18}px`;
        confetti.appendChild(piece);
      }
    }

    function spawnFloat(layer, symbol, className, count) {
      for (let i = 0; i < count; i++) {
        const item = document.createElement('span');
        item.className = className;
        item.textContent = symbol;
        item.style.left = `${10 + Math.random() * 80}%`;
        item.style.fontSize = `${24 + Math.random() * 24}px`;
        item.style.animationDelay = `${Math.random() * 0.35}s`;
        layer.appendChild(item);
      }
    }

    function showSuccess() {
      clearFx();
      successCard.classList.add('show');
      spawnConfetti();
      spawnFloat(winFx, '💗', 'float-heart', 10);
    }

    function showFail() {
      clearFx();
      failCard.classList.add('show');
      spawnFloat(failFx, '💔', 'float-fail', 8);
    }

    function evaluate(timeout = false) {
      isRunning = false;
      cancelAnimationFrame(rafId);
      const cs = toCentiseconds(elapsedMs);
      if (timeout || cs > MAX_CS) {
        elapsedMs = MAX_CS * 10;
        render(elapsedMs);
        showFail();
      } else if (cs === TARGET_CS) {
        elapsedMs = TARGET_CS * 10;
        render(elapsedMs);
        showSuccess();
      } else {
        render(elapsedMs);
        showFail();
      }
      setButtonLabel();
    }

    function tick(now) {
      elapsedMs = now - startTs;
      render(elapsedMs);
      if (toCentiseconds(elapsedMs) > MAX_CS) {
        evaluate(true);
        return;
      }
      rafId = requestAnimationFrame(tick);
    }

    function startWatch() {
      clearFx();
      isRunning = true;
      startTs = performance.now() - elapsedMs;
      setButtonLabel();
      rafId = requestAnimationFrame(tick);
    }

    function resetWatch() {
      cancelAnimationFrame(rafId);
      isRunning = false;
      elapsedMs = 0;
      render(0);
      clearFx();
      setButtonLabel();
    }

    actionBtn.addEventListener('pointerdown', () => actionBtn.classList.add('pressed'));
    ['pointerup','pointerleave','pointercancel'].forEach(evt => actionBtn.addEventListener(evt, () => actionBtn.classList.remove('pressed')));

    actionBtn.addEventListener('click', () => {
      const cs = toCentiseconds(elapsedMs);
      if (isRunning) evaluate(false);
      else if (cs === 0) startWatch();
      else resetWatch();
    });

    render(0);
    setButtonLabel();

    window.GleanBridge.postMessage({
      actionId: 'export-pdf',
      type: 'glean-add-menu',
      metadata: { label: 'Export as PDF', icon: 'export' }
    });
    window.GleanBridge.onMessage('action', function(data) {
      if (data.actionId === 'export-pdf') window.print();
    });

    function prepareChartsForPrint() {
      document.querySelectorAll('[_echarts_instance_]').forEach(function(el) {
        var chart = echarts.getInstanceByDom(el);
        if (!chart) return;
        var img = new Image();
        img.src = chart.getDataURL({ type: 'png', pixelRatio: 2 });
        img.className = 'print-chart-img';
        img.style.cssText = 'width:100%;height:100%;object-fit:contain;position:absolute;top:0;left:0;z-index:10;';
        el.dataset.prevPosition = el.style.position;
        el.style.position = 'relative';
        el.appendChild(img);
      });
    }

    function cleanUpAfterPrint() {
      document.querySelectorAll('[_echarts_instance_]').forEach(function(el) {
        var img = el.querySelector('.print-chart-img');
        if (!img) return;
        img.remove();
        el.style.position = el.dataset.prevPosition || '';
        delete el.dataset.prevPosition;
      });
    }

    window.addEventListener('beforeprint', prepareChartsForPrint);
    window.addEventListener('afterprint', cleanUpAfterPrint);
  </script>
</body>
</html>
